<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="720" height="300" fill="#ffffff"/>
<line x1="150" y1="108" x2="330" y2="196" stroke="#9ca3af" stroke-width="2"/>
<line x1="570" y1="108" x2="390" y2="196" stroke="#9ca3af" stroke-width="2"/>
