<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="720" height="160" fill="#ffffff"/>
<text x="360" y="26" text-anchor="middle" font-size="12" fill="#4b5563">R1、R3 只与 RR 建立 iBGP，彼此无需直连</text>
<line x1="230" y1="80" x2="290" y2="80" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5 3"/>
<line x1="430" y1="80" x2="490" y2="80" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5 3"/>
<rect x="100" y="54" width="130" height="52" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
<text x="165" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">R1</text>
<text x="165" y="94" text-anchor="middle" font-size="11" fill="#4b5563">客户机</text>
<rect x="290" y="54" width="140" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="360" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">R2</text>
<text x="360" y="94" text-anchor="middle" font-size="11" fill="#4b5563">路由反射器 RR</text>
<rect x="490" y="54" width="130" height="52" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
<text x="555" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">R3</text>
<text x="555" y="94" text-anchor="middle" font-size="11" fill="#4b5563">客户机</text>
<text x="260" y="128" text-anchor="middle" font-size="10" fill="#374151">iBGP（反射）</text>
<text x="460" y="128" text-anchor="middle" font-size="10" fill="#374151">iBGP（反射）</text>
<text x="360" y="148" text-anchor="middle" font-size="11" fill="#7c3aed">RR 把 R1 的路由反射给 R3，反之亦然</text>
</svg>
